<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title fetchpriority="high">Aaditya Raj - Cybersecurity Portfolio</title>
    <meta name="description" content="Cybersecurity professional with expertise in network defense, Python scripting, and intrusion detection systems. View my portfolio of security tools and projects." />
    <meta name="keywords" content="cybersecurity, network security, python, golang, rust, security tools, blue team, threat detection" />
    <meta name="author" content="Aaditya Raj" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Critical path optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kaushan+Script&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kaushan+Script&display=swap" rel="stylesheet">
    </noscript>
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 0 0% 3.9%;
        --highlight: 217 71% 41%;
      }
      .dark {
        --background: 0 0% 3.9%;
        --foreground: 0 0% 98%;
        --highlight: 0 84% 60%;
      }
      body {
        margin: 0;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .bg-grid-pattern {
        background-size: 50px 50px;
        background-image: 
          linear-gradient(rgba(30, 64, 175, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 64, 175, 0.03) 1px, transparent 1px);
        position: absolute;
        inset: 0;
      }
      .dark .bg-grid-pattern {
        background-image: 
          linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
      }
      .min-h-dvh { min-height: 100dvh; }
      h1 {
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }
    </style>
    
    <!-- Mobile optimizations -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aaditya Raj - Cybersecurity Portfolio" />
    <meta property="og:description" content="Cybersecurity professional with expertise in network defense, Python scripting, and intrusion detection systems." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Aaditya Raj - Cybersecurity Portfolio" />
    <meta property="twitter:description" content="Cybersecurity professional with expertise in network defense, Python scripting, and intrusion detection systems." />
    <meta name="twitter:creator" content="@KronosWasTaken" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
